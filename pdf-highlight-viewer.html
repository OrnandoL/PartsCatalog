<!doctype html>
<html lang="id">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>PDF BOM Viewer</title>
  <style>
    :root{
      --bg:#f3f4f6;
      --card:#ffffff;
      --text:#111827;
      --muted:#4b5563;
      --accent:#f59e0b;
      --border:#d1d5db;
    }
    *{ box-sizing:border-box; }
    body{
      margin:0;
      font-family: Arial, Helvetica, sans-serif;
      background:var(--bg);
      color:var(--text);
    }
    main{
      max-width:none;
      width:100%;
      margin:0 auto;
      padding:6px;
    }
    .toolbar{
      background:var(--card);
      border:1px solid var(--border);
      border-radius:8px;
      padding:10px;
      margin-bottom:6px;
      display:flex;
      flex-wrap:wrap;
      gap:10px;
      align-items:center;
      justify-content:center;
    }
    .toolbar a{
      text-decoration:none;
      border:1px solid #d97706;
      background:var(--accent);
      color:#111827;
      font-weight:700;
      padding:9px 14px;
      border-radius:6px;
      font-size:30px;
    }
    .meta{
      font-size:17px;
      color:var(--muted);
      flex:1 1 100%;
      min-width:220px;
      overflow:hidden;
      text-overflow:ellipsis;
      white-space:nowrap;
      text-align:center;
    }
    .load-status{
      background:var(--card);
      border:1px solid var(--border);
      border-radius:8px;
      padding:10px 12px;
      margin:0 0 6px 0;
      display:flex;
      align-items:center;
      justify-content:center;
      gap:12px;
      flex-wrap:wrap;
    }
    .load-text{
      font-size:18px;
      font-weight:700;
      color:#9a3412;
      text-align:center;
    }
    .progress-track{
      width:min(520px, 90vw);
      height:12px;
      border-radius:999px;
      background:#fde68a;
      border:1px solid #f59e0b;
      overflow:hidden;
    }
    .progress-fill{
      height:100%;
      width:0%;
      background:linear-gradient(90deg, #f59e0b, #d97706);
      transition:width .2s ease;
    }
    .progress-num{
      font-size:16px;
      font-weight:700;
      color:#92400e;
      min-width:48px;
      text-align:right;
    }
    .zoom-controls{
      display:flex;
      align-items:center;
      gap:8px;
      flex-wrap:wrap;
    }
    .zoom-controls button{
      border:1px solid #d97706;
      background:var(--accent);
      color:#111827;
      font-weight:700;
      border-radius:6px;
      padding:8px 12px;
      font-size:20px;
      cursor:pointer;
      line-height:1;
      min-width:44px;
      min-height:44px;
    }
    .zoom-level{
      font-size:17px;
      color:var(--muted);
      min-width:72px;
      text-align:center;
      font-weight:700;
    }
    .focus-info{
      margin:0 0 6px 0;
      background:#fff7ed;
      border:1px solid #f59e0b;
      border-radius:10px;
      padding:12px 16px;
      text-align:center;
      font-size:34px;
      font-weight:700;
      color:#9a3412;
      letter-spacing:.2px;
    }
    .focus-info small{
      display:block;
      margin-top:5px;
      font-size:20px;
      font-weight:400;
      color:#92400e;
    }
    .het-pill{
      display:inline-block;
      margin-left:10px;
      padding:4px 10px;
      border-radius:999px;
      border:1px solid #d97706;
      background:#f59e0b;
      color:#111827;
      font-size:20px;
      font-weight:700;
      vertical-align:middle;
      white-space:nowrap;
    }
    .het-pill.missing{
      background:#fef3c7;
      color:#78350f;
      border-color:#f59e0b;
    }
    .viewer{
      background:var(--card);
      border:1px solid var(--border);
      border-radius:8px;
      padding:6px;
      overflow:auto;
    }
    .viewer-stage{
      display:flex;
      justify-content:center;
      align-items:flex-start;
      width:100%;
      min-width:max-content;
      min-height:70vh;
    }
    .warn{
      display:none;
      margin-bottom:6px;
      padding:12px 14px;
      border-radius:6px;
      border:1px solid #f59e0b;
      background:#fffbeb;
      color:#92400e;
      font-size:22px;
    }
    .page-wrap{
      position:relative;
      width:max-content;
      margin:0 auto;
    }
    #pdfCanvas{
      display:block;
      height:auto;
    }
    #highlightCanvas{
      position:absolute;
      left:0;
      top:0;
      pointer-events:none;
    }
    #pdfFrame{
      display:none;
      width:100%;
      height:92vh;
      border:0;
    }
  </style>
</head>
<body>
  <main>
    <div class="toolbar">
      <a id="openOriginal" href="#" target="_blank" rel="noopener">Buka PDF Asli</a>
      <div class="zoom-controls">
        <button id="zoomOut" type="button" aria-label="Zoom out">-</button>
        <div class="zoom-level" id="zoomLevel">100%</div>
        <button id="zoomIn" type="button" aria-label="Zoom in">+</button>
        <button id="zoomReset" type="button" aria-label="Reset zoom">Reset</button>
      </div>
      <div class="meta" id="meta">Memuat PDF...</div>
    </div>
    <div class="load-status" id="loadStatus">
      <div class="load-text" id="loadText">Memuat PDF...</div>
      <div class="progress-track"><div class="progress-fill" id="progressFill"></div></div>
      <div class="progress-num" id="progressNum">0%</div>
    </div>
    <div class="focus-info" id="focusInfo">Halaman - | Kata kunci -<small>Info cepat pencarian BOM</small></div>
    <div class="viewer">
      <div class="warn" id="warn"></div>
      <div class="viewer-stage" id="viewerStage">
        <div class="page-wrap">
          <canvas id="pdfCanvas"></canvas>
          <canvas id="highlightCanvas"></canvas>
        </div>
      </div>
      <iframe id="pdfFrame" title="PDF Viewer"></iframe>
    </div>
  </main>

  <script src="het-index.js?v=20260304-2"></script>
  <script type="module">
    import * as pdfjsLib from "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.8.69/pdf.min.mjs";
    pdfjsLib.GlobalWorkerOptions.workerSrc = "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.8.69/pdf.worker.min.mjs";

    const params = new URLSearchParams(window.location.search);
    const file = params.get("file");
    const pageParam = Number(params.get("page") || "1");
    const search = (params.get("search") || "").trim();

    const metaEl = document.getElementById("meta");
    const focusInfoEl = document.getElementById("focusInfo");
    const openOriginal = document.getElementById("openOriginal");
    const warnEl = document.getElementById("warn");
    const viewerStage = document.getElementById("viewerStage");
    const pdfCanvas = document.getElementById("pdfCanvas");
    const hlCanvas = document.getElementById("highlightCanvas");
    const pdfFrame = document.getElementById("pdfFrame");
    const zoomOutBtn = document.getElementById("zoomOut");
    const zoomInBtn = document.getElementById("zoomIn");
    const zoomResetBtn = document.getElementById("zoomReset");
    const zoomLevelEl = document.getElementById("zoomLevel");
    const loadStatusEl = document.getElementById("loadStatus");
    const loadTextEl = document.getElementById("loadText");
    const progressFillEl = document.getElementById("progressFill");
    const progressNumEl = document.getElementById("progressNum");
    const pdfCtx = pdfCanvas.getContext("2d");
    const hlCtx = hlCanvas.getContext("2d");
    const isMobile = window.innerWidth < 900;
    const MIN_SCALE = 0.9;
    const MAX_SCALE = 4.0;
    const ZOOM_STEP = 0.25;
    const DEFAULT_SCALE = isMobile ? 1.8 : 2.3;
    let currentScale = DEFAULT_SCALE;
    let pdfDoc = null;
    let pdfLoadingPromise = null;

    if (!file) {
      metaEl.textContent = "Parameter file tidak ditemukan.";
      throw new Error("Missing file parameter");
    }

    const pdfPath = decodeURIComponent(file);
    const pageNum = Number.isFinite(pageParam) && pageParam > 0 ? pageParam : 1;
    const absolutePdfUrl = new URL(pdfPath, window.location.href).href;
    const fragment = `#page=${pageNum}&zoom=page-width&search=${encodeURIComponent(search)}`;
    const targetUrl = `${absolutePdfUrl}${fragment}`;
    openOriginal.href = targetUrl;

    const norm = (v) => String(v || "").toUpperCase().replace(/[^A-Z0-9]/g, "");
    const targetNorm = norm(search);
    const hetPrices = window.HET_INDEX && window.HET_INDEX.prices ? window.HET_INDEX.prices : null;

    const esc = (v) => String(v || "")
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;")
      .replace(/'/g, "&#39;");

    const formatRupiah = (value) => {
      if (typeof value !== "number" || Number.isNaN(value)) return "-";
      return `Rp ${new Intl.NumberFormat("id-ID").format(value)}`;
    };

    function resolveHet(partCompact) {
      if (!hetPrices || !partCompact) return null;
      if (hetPrices[partCompact]) return hetPrices[partCompact];
      if (partCompact.length > 11 && hetPrices[partCompact.slice(0, 11)]) return hetPrices[partCompact.slice(0, 11)];
      return null;
    }

    const hetRecord = resolveHet(targetNorm);

    function renderFocusInfo(pageLabel, subLabel) {
      const keyword = esc(search || "-");
      let hetBadge = '<span class="het-pill missing">HET: tidak tersedia</span>';
      if (hetRecord) {
        hetBadge = `<span class="het-pill">HET: ${esc(formatRupiah(hetRecord.price))}</span>`;
      }
      focusInfoEl.innerHTML = `${pageLabel} | Kata kunci: ${keyword} ${hetBadge}<small>${subLabel}</small>`;
    }

    function setLoadingState(show, text, percent) {
      loadStatusEl.style.display = show ? "flex" : "none";
      if (text) loadTextEl.textContent = text;
      if (typeof percent === "number" && Number.isFinite(percent)) {
        const safe = Math.max(0, Math.min(100, Math.round(percent)));
        progressFillEl.style.width = `${safe}%`;
        progressNumEl.textContent = `${safe}%`;
      }
    }

    function showFallback(message) {
      setLoadingState(false);
      warnEl.style.display = "block";
      warnEl.textContent = "Panduan: tekan Ctrl + F, lalu ketik kata kunci part number untuk highlight/mencari dengan lebih mudah.";
      viewerStage.style.display = "none";
      pdfFrame.style.display = "block";
      pdfFrame.src = targetUrl;
    }

    async function getPdfDoc() {
      if (pdfDoc) return pdfDoc;
      if (pdfLoadingPromise) return pdfLoadingPromise;

      setLoadingState(true, "Memuat PDF...", 0);
      const loadingTask = pdfjsLib.getDocument(absolutePdfUrl);
      loadingTask.onProgress = (progressData) => {
        const loaded = progressData && progressData.loaded ? progressData.loaded : 0;
        const total = progressData && progressData.total ? progressData.total : 0;
        if (total > 0) {
          setLoadingState(true, "Memuat PDF...", (loaded / total) * 100);
        } else {
          setLoadingState(true, "Memuat PDF...", null);
        }
      };
      pdfLoadingPromise = loadingTask.promise.then((doc) => {
        pdfDoc = doc;
        setLoadingState(true, "Menyiapkan halaman...", 100);
        return doc;
      }).finally(() => {
        pdfLoadingPromise = null;
      });
      return pdfLoadingPromise;
    }

    function centerPdfInView() {
      const viewer = viewerStage.parentElement;
      if (!viewer) return;
      requestAnimationFrame(() => {
        const maxX = Math.max(0, viewer.scrollWidth - viewer.clientWidth);
        viewer.scrollLeft = Math.round(maxX / 2);
      });
    }

    function setZoomLabel() {
      zoomLevelEl.textContent = `${Math.round(currentScale * 100)}%`;
    }

    async function renderWithHighlight() {
      const pdf = await getPdfDoc();
      const safePage = Math.min(Math.max(1, pageNum), pdf.numPages);
      const page = await pdf.getPage(safePage);
      const viewport = page.getViewport({ scale: currentScale });

      pdfCanvas.width = viewport.width;
      pdfCanvas.height = viewport.height;
      hlCanvas.width = viewport.width;
      hlCanvas.height = viewport.height;

      setLoadingState(true, "Merender halaman...", 100);
      await page.render({ canvasContext: pdfCtx, viewport }).promise;

      hlCtx.clearRect(0, 0, hlCanvas.width, hlCanvas.height);
      hlCtx.fillStyle = "rgba(245, 158, 11, 0.35)";
      hlCtx.strokeStyle = "rgba(217, 119, 6, 0.85)";
      hlCtx.lineWidth = 1;

      let hitCount = 0;
      if (targetNorm) {
        const textContent = await page.getTextContent();
        for (const item of textContent.items) {
          const token = norm(item.str);
          if (!token || !token.includes(targetNorm)) continue;

          const tx = pdfjsLib.Util.transform(viewport.transform, item.transform);
          const x = tx[4];
          const y = tx[5];
          const h = Math.max(10, Math.hypot(tx[2], tx[3]));
          const w = Math.max(12, item.width * viewport.scale);
          const top = y - h;

          hlCtx.fillRect(x, top, w, h);
          hlCtx.strokeRect(x, top, w, h);
          hitCount += 1;
        }
      }

      setZoomLabel();
      metaEl.textContent = `File: ${absolutePdfUrl} | Zoom: ${Math.round(currentScale * 100)}% | Highlight: ${hitCount}`;
      renderFocusInfo(`Halaman ${safePage} / ${pdf.numPages}`, `Highlight ditemukan: ${hitCount}`);
      centerPdfInView();
      setLoadingState(false);
    }

    async function applyZoom(scale) {
      const bounded = Math.min(MAX_SCALE, Math.max(MIN_SCALE, scale));
      if (Math.abs(bounded - currentScale) < 0.001) return;
      currentScale = bounded;
      try {
        await renderWithHighlight();
      } catch (err) {
        showFallback(`Gagal render zoom: ${err && err.message ? err.message : err}`);
      }
    }

    zoomOutBtn.addEventListener("click", () => applyZoom(currentScale - ZOOM_STEP));
    zoomInBtn.addEventListener("click", () => applyZoom(currentScale + ZOOM_STEP));
    zoomResetBtn.addEventListener("click", () => applyZoom(DEFAULT_SCALE));

    if (window.location.protocol === "file:") {
      showFallback("Mode file:// tidak mendukung highlight warna yang stabil. Jalankan lewat http://localhost agar highlight aktif.");
      metaEl.textContent = `File: ${absolutePdfUrl} | Fallback viewer`;
      renderFocusInfo(`Halaman ${pageNum}`, "Mode fallback viewer");
    } else {
      try {
        await renderWithHighlight();
      } catch (err) {
        showFallback(`Gagal highlight otomatis: ${err && err.message ? err.message : err}`);
        metaEl.textContent = `File: ${absolutePdfUrl} | Fallback viewer`;
        renderFocusInfo(`Halaman ${pageNum}`, "Mode fallback viewer");
      }
    }
  </script>
</body>
</html>
