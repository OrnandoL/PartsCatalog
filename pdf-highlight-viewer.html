<!doctype html>
<html lang="id">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>PDF BOM Viewer</title>
  <style>
    :root{
      --bg:#f3f4f6;
      --card:#ffffff;
      --text:#111827;
      --muted:#4b5563;
      --accent:#f59e0b;
      --border:#d1d5db;
    }
    *{ box-sizing:border-box; }
    body{
      margin:0;
      font-family: Arial, Helvetica, sans-serif;
      background:var(--bg);
      color:var(--text);
    }
    main{
      max-width:none;
      width:100%;
      margin:0 auto;
      padding:6px;
    }
    .toolbar{
      background:var(--card);
      border:1px solid var(--border);
      border-radius:8px;
      padding:10px;
      margin-bottom:6px;
      display:flex;
      flex-wrap:wrap;
      gap:10px;
      align-items:center;
    }
    .toolbar a{
      text-decoration:none;
      border:1px solid #d97706;
      background:var(--accent);
      color:#111827;
      font-weight:700;
      padding:9px 14px;
      border-radius:6px;
      font-size:30px;
    }
    .meta{
      font-size:17px;
      color:var(--muted);
      flex:1 1 320px;
      min-width:220px;
      overflow:hidden;
      text-overflow:ellipsis;
      white-space:nowrap;
    }
    .focus-info{
      margin:0 0 6px 0;
      background:#fff7ed;
      border:1px solid #f59e0b;
      border-radius:10px;
      padding:12px 16px;
      text-align:center;
      font-size:34px;
      font-weight:700;
      color:#9a3412;
      letter-spacing:.2px;
    }
    .focus-info small{
      display:block;
      margin-top:5px;
      font-size:20px;
      font-weight:400;
      color:#92400e;
    }
    .viewer{
      background:var(--card);
      border:1px solid var(--border);
      border-radius:8px;
      padding:6px;
      overflow:auto;
    }
    .warn{
      display:none;
      margin-bottom:6px;
      padding:12px 14px;
      border-radius:6px;
      border:1px solid #f59e0b;
      background:#fffbeb;
      color:#92400e;
      font-size:22px;
    }
    .page-wrap{
      position:relative;
      width:max-content;
      margin:0 auto;
    }
    #pdfCanvas{
      display:block;
      max-width:100%;
      height:auto;
    }
    #highlightCanvas{
      position:absolute;
      left:0;
      top:0;
      pointer-events:none;
    }
    #pdfFrame{
      display:none;
      width:100%;
      height:92vh;
      border:0;
    }
  </style>
</head>
<body>
  <main>
    <div class="toolbar">
      <a id="openOriginal" href="#" target="_blank" rel="noopener">Buka PDF Asli</a>
      <div class="meta" id="meta">Memuat PDF...</div>
    </div>
    <div class="focus-info" id="focusInfo">Halaman - | Kata kunci -<small>Info cepat pencarian BOM</small></div>
    <div class="viewer">
      <div class="warn" id="warn"></div>
      <div class="page-wrap">
        <canvas id="pdfCanvas"></canvas>
        <canvas id="highlightCanvas"></canvas>
      </div>
      <iframe id="pdfFrame" title="PDF Viewer"></iframe>
    </div>
  </main>

  <script type="module">
    import * as pdfjsLib from "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.8.69/pdf.min.mjs";
    pdfjsLib.GlobalWorkerOptions.workerSrc = "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.8.69/pdf.worker.min.mjs";

    const params = new URLSearchParams(window.location.search);
    const file = params.get("file");
    const pageParam = Number(params.get("page") || "1");
    const search = (params.get("search") || "").trim();

    const metaEl = document.getElementById("meta");
    const focusInfoEl = document.getElementById("focusInfo");
    const openOriginal = document.getElementById("openOriginal");
    const warnEl = document.getElementById("warn");
    const pdfCanvas = document.getElementById("pdfCanvas");
    const hlCanvas = document.getElementById("highlightCanvas");
    const pdfFrame = document.getElementById("pdfFrame");
    const pdfCtx = pdfCanvas.getContext("2d");
    const hlCtx = hlCanvas.getContext("2d");

    if (!file) {
      metaEl.textContent = "Parameter file tidak ditemukan.";
      throw new Error("Missing file parameter");
    }

    const pdfPath = decodeURIComponent(file);
    const pageNum = Number.isFinite(pageParam) && pageParam > 0 ? pageParam : 1;
    const absolutePdfUrl = new URL(pdfPath, window.location.href).href;
    const fragment = `#page=${pageNum}&zoom=page-width&search=${encodeURIComponent(search)}`;
    const targetUrl = `${absolutePdfUrl}${fragment}`;
    openOriginal.href = targetUrl;

    const norm = (v) => String(v || "").toUpperCase().replace(/[^A-Z0-9]/g, "");
    const targetNorm = norm(search);

    function showFallback(message) {
      warnEl.style.display = "block";
      warnEl.textContent = "Panduan: tekan Ctrl + F, lalu ketik kata kunci part number untuk highlight/mencari dengan lebih mudah.";
      pdfFrame.style.display = "block";
      pdfFrame.src = targetUrl;
    }

    async function renderWithHighlight() {
      const loadingTask = pdfjsLib.getDocument(absolutePdfUrl);
      const pdf = await loadingTask.promise;
      const safePage = Math.min(Math.max(1, pageNum), pdf.numPages);
      const page = await pdf.getPage(safePage);
      const viewport = page.getViewport({ scale: window.innerWidth < 900 ? 1.8 : 2.3 });

      pdfCanvas.width = viewport.width;
      pdfCanvas.height = viewport.height;
      hlCanvas.width = viewport.width;
      hlCanvas.height = viewport.height;

      await page.render({ canvasContext: pdfCtx, viewport }).promise;

      hlCtx.clearRect(0, 0, hlCanvas.width, hlCanvas.height);
      hlCtx.fillStyle = "rgba(245, 158, 11, 0.35)";
      hlCtx.strokeStyle = "rgba(217, 119, 6, 0.85)";
      hlCtx.lineWidth = 1;

      let hitCount = 0;
      if (targetNorm) {
        const textContent = await page.getTextContent();
        for (const item of textContent.items) {
          const token = norm(item.str);
          if (!token || !token.includes(targetNorm)) continue;

          const tx = pdfjsLib.Util.transform(viewport.transform, item.transform);
          const x = tx[4];
          const y = tx[5];
          const h = Math.max(10, Math.hypot(tx[2], tx[3]));
          const w = Math.max(12, item.width * viewport.scale);
          const top = y - h;

          hlCtx.fillRect(x, top, w, h);
          hlCtx.strokeRect(x, top, w, h);
          hitCount += 1;
        }
      }

      metaEl.textContent = `File: ${absolutePdfUrl} | Highlight: ${hitCount}`;
      focusInfoEl.innerHTML = `Halaman ${safePage} / ${pdf.numPages} | Kata kunci: ${search || "-"}<small>Highlight ditemukan: ${hitCount}</small>`;
    }

    if (window.location.protocol === "file:") {
      showFallback("Mode file:// tidak mendukung highlight warna yang stabil. Jalankan lewat http://localhost agar highlight aktif.");
      metaEl.textContent = `File: ${absolutePdfUrl} | Fallback viewer`;
      focusInfoEl.innerHTML = `Halaman ${pageNum} | Kata kunci: ${search || "-"}<small>Mode fallback viewer</small>`;
    } else {
      try {
        await renderWithHighlight();
      } catch (err) {
        showFallback(`Gagal highlight otomatis: ${err && err.message ? err.message : err}`);
        metaEl.textContent = `File: ${absolutePdfUrl} | Fallback viewer`;
        focusInfoEl.innerHTML = `Halaman ${pageNum} | Kata kunci: ${search || "-"}<small>Mode fallback viewer</small>`;
      }
    }
  </script>
</body>
</html>
